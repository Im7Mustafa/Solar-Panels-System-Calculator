<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Solar Panels Calculator</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/contact.css">
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
</head>

<body>

    <div class="navbar glass-effect">
        <div class="logo">SolarCalc</div>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="about.html">About</a>
            <a href="calc.html">Calculator</a>
            <a href="contact.html" class="active">Contact us</a>
        </div>
    </div>

    <div class="contact-page-container">
        <div class="overlay"></div>

        <div class="contact-wrapper">

            <div class="contact-header glass-effect">
                <p class="title">Get In Touch</p>
                <p class="desc">Have questions about your solar setup? We are here to help you power your future.</p>
            </div>

            <div class="contact-form glass-effect">
                <div class="input-group">
                    <p class="label">Full Name</p>
                    <input type="text" placeholder="Enter your name">
                </div>

                <div class="input-group">
                    <p class="label">Email Address</p>
                    <input type="email" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <p class="label">Your Message</p>
                    <textarea placeholder="How can we help you?" rows="5"></textarea>
                </div>

                <button class="btn glass-btn">Send Message</button>
            </div>

        </div>
    </div>

</body>

</html>
